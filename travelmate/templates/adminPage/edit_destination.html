{% extends 'adminPage/admin_base.html' %}

{% load static %}

{% block title %}

Home - Travel Mate

{% endblock %}

{% block extra_css %}
   <link rel="stylesheet" href="{% static 'css/contact.css' %}">
{% endblock %}

{% block content %}

<!-- Destinations -->

<div class="main-content">
        <div class="container mt-5">

            <div class="row justify-content-center">

                <div class="col-lg-8">

                    <div class="contact-box">

                        <h3 class="section-title mb-4">
                            Add Destination
                        </h3>

                        <!-- {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-success">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %} -->

                        <form method="POST" enctype="multipart/form-data">

                            {% csrf_token %}

                            <div class="mb-3">

                                <label class="form-label">
                                    Destination Name
                                </label>

                                <input type="text"
                                    name="name"
                                    value="{{ destination.name }}"
                                    class="form-control"
                                    placeholder="Enter destination name"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Destination Image
                                </label>

                                <input type="file"
                                    name="image"
                                    class="form-control"
                                    required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Description
                                </label>

                                <textarea name="description"
                                        rows="5"
                                        class="form-control"
                                        placeholder="Enter destination description"
                                        required>{{ destination.description }}</textarea>

                            </div>

                            <button type="submit"
                                    class="btn-main">
                                Update Destination
                            </button>

                        </form>

                    </div>

                </div>

            </div>

    </div>
</div>

{% endblock %}

{% block extra_js %}

    <script>
        function confirmDelete(id){

            if(confirm("Are you sure you want to delete this destination?")){

                d_id = parseInt(id);
                window.location.href = "/delete_destination/" + d_id + "/";

            }

        }
    </script>

{% endblock %}
