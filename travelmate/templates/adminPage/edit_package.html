{% extends 'adminPage/admin_base.html' %}

{% load static %}

{% block title %}
Edit Package
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/contact.css' %}">
{% endblock %}

{% block content %}

<div class="main-content">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="contact-box">

                    <h3 class="section-title mb-4">
                        Edit Package
                    </h3>

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">
                                Package Title
                            </label>

                            <input type="text"
                                   name="title"
                                   value="{{ package.title }}"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Location
                            </label>

                            <input type="text"
                                   name="location"
                                   value="{{ package.location }}"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Current Image
                            </label>

                            <br>

                            <img src="{{ package.image.url }}"
                                 width="250"
                                 class="img-thumbnail mb-3">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Change Image
                            </label>

                            <input type="file"
                                   name="image"
                                   class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Duration
                            </label>

                            <input type="text"
                                   name="duration"
                                   value="{{ package.duration }}"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Travel Date
                            </label>

                            <input type="text"
                                   name="travel_date"
                                   value="{{ package.travel_date }}"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Price
                            </label>

                            <input type="number"
                                   step="0.01"
                                   name="price"
                                   value="{{ package.price }}"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Description
                            </label>

                            <textarea name="description"
                                      rows="5"
                                      class="form-control"
                                      required>{{ package.description }}</textarea>

                        </div>

                        <div class="form-check mb-4">

                            <input class="form-check-input"
                                   type="checkbox"
                                   name="is_recommended"
                                   id="recommended"
                                   {% if package.is_recommended %}checked{% endif %}>

                            <label class="form-check-label"
                                   for="recommended">
                                Recommended Package
                            </label>

                        </div>

                        <button type="submit"
                                class="btn-main">
                            Update Package
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
