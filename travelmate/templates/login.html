<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Travel Diary Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

    body{
        height:100vh;
        overflow:hidden;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#e7d5ff,#d9ecff);
        font-family:'Segoe UI',sans-serif;
        margin:0;
    }

    .main-container{
        width:95%;
        min-height:90vh;
        max-width:1400px;
        border-radius:20px;
        padding:15px;
        overflow:hidden;
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(10px);
    }

    .row{
        height:100%;
    }

    .left-panel{
        height:100%;
        padding:40px;
        display:flex;
        flex-direction:column;
        justify-content:center;
    }

    form{
        width:100%;
    }

    .btn-login{
        display:block !important;
        width:100%;
        margin-top:10px;
        background:linear-gradient(to right,#ff6ba8,#8b5cf6);
        border:none;
        color:white;
        height:55px;
        border-radius:12px;
        font-weight:bold;
    }

    .right-panel{
        height:100%;
        overflow:hidden;
    }

    .right-panel img{
        width:100%;
        height:100%;
        object-fit:cover;
    }

    .logo-section{
        width:100%;
        text-align:center;
    }

    .logo{
        color:#ff4da6;
        font-weight:700;
        font-size:48px;
        margin-bottom:5px;
    }

    .subtitle{
        color:#666;
        font-size:18px;
    }

    .heading{
        color:#ff4da6;
        font-size:42px;
        font-weight:700;
    }

    .form-control{
        height:55px;
        border:none;
        border-radius:12px;
        background:#ffffffcc;
    }

    .btn-login:hover{
        color:white;
    }

    a{
        text-decoration:none;
    }

    .custom-alert{
        background:#ffe5e5;
        color:#d32f2f;
        border-left:4px solid #d32f2f;
        padding:12px;
        margin-bottom:15px;
        border-radius:8px;
        font-weight:500;
    }

</style>
</head>

<body>

    <div class="container-fluid main-container">
        <div class="row">
            <div class="col-lg-5">
                <div class="left-panel">
                    <div class="logo-section text-center mb-5">
                        <h1 class="logo">TRAVEL MATE</h1>
                        <p class="subtitle">Join the journey</p>
                    </div>
                    <h1 class="heading md-2">Welcome Back!</h1>
                    <p class="text-muted">Login to continue your travel adventures</p>
                    
                    <form method="POST">
                        {% csrf_token %}

                        {% if messages %}
                            {% for message in messages %}
                                <div class="custom-alert">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}

                        <div class="mb-3">
                            <input type="text" name="username" class="form-control" placeholder="Username">
                        </div>

                        <div class="mb-3">
                            <input type="password" name="password" class="form-control" placeholder="Password">
                        </div>

                        <div class="d-flex justify-content-between mb-4">
                            <a href="#">Forgot Password?</a>
                        </div>

                        <button class="btn btn-login w-100"> SIGN IN → </button>

                    </form>

                    <div class="text-center mt-5">
                        Don't have an account? <a href="{% url 'register' %}">Create Account</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-6">
                <div class="right-panel">
                    <img src="https://images.unsplash.com/photo-1527838832700-5059252407fa" alt="Travel">
                </div>
            </div>

        </div>

    </div>

</body>
</html>
